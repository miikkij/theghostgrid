<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tactical Mesh — Operator Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/shared/design-system.css">
  <link rel="stylesheet" href="/static/screen/style.css">
</head>
<body>
  <div id="app">
    <canvas id="battlefield"></canvas>

    <!-- Cycle / Timer — top-left -->
    <div id="cycle-indicator" class="overlay-panel top-left">
      <div class="utc-time mono" data-utc>--:--:-- UTC</div>
      <div class="cycle-number mono">CYCLE <span class="cycle-val" data-cycle>0000</span></div>
      <div class="cycle-phase mono" data-phase>IDLE</div>
      <div class="cycle-progress"><div class="bar" data-progress-bar></div></div>
    </div>

    <!-- Telemetry — top-right -->
    <div id="telemetry" class="overlay-panel top-right">
      <div class="tel-row"><span class="label">PACKETS</span><span class="value mono" data-packets>0</span></div>
      <div class="tel-row"><span class="label">DRIFT</span><span class="value mono" data-drift>0ms</span></div>
      <div class="tel-row"><span class="label">NODES</span><span class="value mono" data-nodes>0</span></div>
      <div class="tel-row"><span class="label">DECOYS</span><span class="value mono" data-decoys>0</span></div>
      <div class="tel-row"><span class="label">AI</span><span class="value mono" data-ai-status>Off</span></div>
    </div>

    <!-- AI Reasoning — bottom-left, slides in -->
    <div id="ai-reasoning" class="overlay-panel bottom-left hidden">
      <div class="ai-header">
        <span class="ai-icon">&#9670;</span>
        <span class="ai-title">AI REASONING</span>
        <span class="ai-timestamp mono" data-ai-time></span>
      </div>
      <div id="reasoning-content"></div>
    </div>

    <!-- Simulation control -->
    <div id="sim-control" class="overlay-panel bottom-center">
      <button id="sim-toggle" class="sim-btn mono" title="Run test simulation">
        <span class="sim-play">&#9654;</span> SIMULATION
      </button>
    </div>

    <!-- Simulation active badge -->
    <div id="sim-badge" class="sim-badge mono hidden">
      <span class="sim-pulse"></span> SIMULATION ACTIVE
    </div>

    <!-- FPS counter (dev) -->
    <div id="fps-counter" class="overlay-panel bottom-right mono">
      <span data-fps>60</span> FPS
    </div>


    <!-- Disconnected overlay -->
    <div id="disconnected-overlay" class="hidden">
      <div class="disconnect-content">
        <div class="disconnect-icon">&#x26A0;</div>
        <div class="disconnect-text">DISCONNECTED</div>
        <div class="disconnect-sub">Attempting to reconnect&hellip;</div>
      </div>
    </div>
  </div>

  <!-- System pulse — fixed bar below the battlefield -->
  <div id="pulse-bar" style="position:fixed;bottom:0;left:0;right:0;height:48px;background:#0A0E1A;border-top:1px solid #2A3447;z-index:20;">
    <canvas id="pulse-canvas" style="width:100%;height:100%;display:block;"></canvas>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/static/shared/connection.js"></script>
  <script src="/static/shared/pulse.js"></script>
  <script src="/static/screen/render.js"></script>
  <script src="/static/screen/script.js"></script>
</body>
</html>
